name: Android CI and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: android-release-main
  cancel-in-progress: false

jobs:
  test-and-release:
    name: Test and create release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Prepare release metadata
        id: release
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="main-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"

          cat > release-notes.md <<EOF
          Automated release from a merge to main.

          Commit: ${GITHUB_SHA}

          Checks run:
          - ./gradlew testDebugUnitTest
          - ./gradlew assembleRelease
          EOF

          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            app/build/outputs/apk/release/*.apk \
            --target "${GITHUB_SHA}" \
            --title "Main release ${{ steps.release.outputs.short_sha }}" \
            --notes-file release-notes.md
